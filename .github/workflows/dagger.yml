name: MLOps Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'go/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # Job 1: BUILD-MODEL - Trains the model and uploads the artifact
  build-model:
    runs-on: ubuntu-latest
    #   Define an output to expose the MLflow Run ID
    outputs:
      run_id: ${{ steps.get-run-id.outputs.run_id }} 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # --- Setup & Data Staging ---
      - name: Setup Python & Install DVC
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DVC and Dependencies (SHELL)
        run: pip install dvc

      - name: DVC Pull Data and Copy to Dagger Source
        working-directory: notebooks/
        run: |
          dvc pull
          mkdir -p ../go/python-files/artifacts
          cp -r artifacts/. ../go/python-files/artifacts/

      # --- Dagger Execution (Build Phase) ---
      - name: Run Dagger Build Pipeline
        uses: dagger/dagger-for-github@v8.2.0 
        with:
          workdir: go
          verb: run
          args: go run pipeline.go 
          version: "0.19.6"

      # --- Upload Artifact (DELIVERY) ---
      #   Capture the Run ID saved to the artifact directory by train_model.py
      - name: Get MLflow Run ID from Artifact Directory
        id: get-run-id # We reference this ID to set the job output
        run: |
          # The file is exported by Dagger to go/model/mlflow_run_id.txt
          RUN_ID=$(cat go/model/mlflow_run_id.txt)
          echo "MLflow Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT # Set the run_id output for the job
        
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: go/model/ 



  # Job 2: TEST-DEPLOY (Relies on the artifact and the Run ID)
  test-deploy:
    runs-on: ubuntu-latest
    needs: build-model 
    #   Capture the Run ID from the previous job and set it as an environment variable
    env:
      TRAINING_RUN_ID: ${{ needs.build-model.outputs.run_id }} 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Save Python dependencies from cache
      # This step checks if the dependencies defined in requirements.txt have been installed before.
      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          # Caches the pip directory where packages are stored
          path: ~/.cache/pip
          # The key changes ONLY when the contents of requirements.txt changes.
          key: ${{ runner.os }}-pip-${{ hashFiles('go/python-files/requirements.txt') }}
          # Fallback keys for restoring partially matching caches
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: model/ 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install the dependencies from the requirements file
      - name: Install Test Dependencies
          # If the cache hits (key is matched), this install runs in seconds.
          # If the cache misses (requirements changed), it runs a full install and saves the new cache.
        run: pip install -r go/python-files/requirements.txt

      # test_inference_and_deploy.py will now use the TRAINING_RUN_ID variable
      - name: Execute Inference Test and Deployment
        run: python go/python-files/test_inference_and_deploy.py