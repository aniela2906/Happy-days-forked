name: Decoupled Train/Test Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'go/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # Job 1: BUILD-MODEL - Trains the model and uploads the artifact
  build-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # --- Setup & Data Staging ---
      - name: Setup Python & Install DVC
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DVC and Dependencies (SHELL)
        run: pip install dvc

      - name: DVC Pull Data and Copy to Dagger Source
        working-directory: notebooks/
        run: |
          dvc pull
          mkdir -p ../go/python-files/artifacts
          cp -r artifacts/. ../go/python-files/artifacts/

      # --- Dagger Execution (Build Phase) ---
      # This step replaces the multi-line install/run that was failing.
      - name: Run Dagger Build Pipeline
        uses: dagger/dagger-for-github@v8.2.0 
        with:
          workdir: go # Run from the 'go' directory
          verb: run
          args: go run pipeline.go # Executes the Go program
          version: "0.19.6" # Use the specific version to match instructions
          
      # --- Upload Artifact (DELIVERY) ---
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: go/model/ 

  # Job 2: TEST-DEPLOY (Remains unchanged, relies on the artifact)
  test-deploy:
    runs-on: ubuntu-latest
    needs: build-model 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: model/ 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Test Dependencies
        run: pip install pandas joblib mlflow scikit-learn xgboost numpy opentelemetry-exporter-otlp-proto-http
      - name: Execute Inference Test and Deployment
        run: python go/python-files/test_inference_and_deploy.py