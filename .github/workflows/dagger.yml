name: Train/Test Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'go/**' # Workflow runs only when core code changes
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # Job 1: BUILD-MODEL - Trains the model and uploads the artifact
  build-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # --- Setup & Data Staging ---
      - name: Setup Python & Install DVC
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DVC and Dependencies (SHELL)
        run: pip install dvc

      - name: DVC Pull Data and Copy to Dagger Source
        working-directory: notebooks/
        run: |
          dvc pull
          mkdir -p ../go/python-files/artifacts
          cp -r artifacts/. ../go/python-files/artifacts/

      # --- Dagger Execution (Build Phase) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' 

      - name: Execute Dagger Training Pipeline (Final Attempt)
        working-directory: go/
        #Combine install and run into a single shell session
        run: |
          # 1. Install Dagger CLI locally
          curl -L https://dl.dagger.io/dagger/install.sh | sh
          
          # 2. Add the installation directory to the current shell's PATH
          export PATH="$HOME/.dagger/bin:$PATH"
          
          # 3. Execute the commands (dagger is guaranteed to be found now)
          go mod tidy
          dagger call build
          
      # --- Upload Artifact (DELIVERY) ---
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: go/model/ 

  # Job 2: TEST-DEPLOY - Downloads artifact, runs inference validation, and promotes
  test-deploy:
    runs-on: ubuntu-latest
    needs: build-model # CRITICAL: This job waits until the 'build-model' job succeeds.
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      # --- Download Artifact (Retrieving the Model) ---
      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: model/ 
          
      # --- Setup Environment for Testing ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Test Dependencies
        run: pip install pandas joblib mlflow scikit-learn xgboost numpy opentelemetry-exporter-otlp-proto-http

      # --- Execute Validation Test and Deployment ---
      - name: Execute Inference Test and Deployment
        # Runs the new script that validates the downloaded artifact and promotes it.
        run: python go/python-files/test_inference_and_deploy.py